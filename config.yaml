database:
  driver: sqlite
  dsn: /tmp/data/rss.db

server:
  host: 0.0.0.0
  port: 8080

rss:
  fetch_interval_minutes: 15
  image_width: 320
  image_height: 240

feeds:
  - name: HackerNews
    url: https://news.ycombinator.com/rss
    enabled: false
  - name: BBC Business
    url: https://feeds.bbci.co.uk/news/business/rss.xml
    enabled: true
